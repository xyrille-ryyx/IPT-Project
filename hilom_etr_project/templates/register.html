{% extends "layout.html" %}
{% block title %}Create Account | HILOM{% endblock %}

{% block content %}
<div class="login-card">
    <div class="text-center mb-3">
        <img src="{{ url_for('static', filename='img/logo.jpg') }}" class="login-logo" alt="HILOM Logo">
    </div>

    <h1 class="text-center mb-2">HILOM</h1>
    <p class="text-center text-muted mb-4">Create New User Account</p>

    <form method="post" action="{{ url_for('register') }}">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Create Account
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('login') }}" class="text-decoration-none">
            Already have an account? Login
        </a>
    </div>
</div>
{% endblock %}
