{% extends "layout.html" %}
{% block title %}Login | HILOM{% endblock %}

{% block content %}
<div class="login-card">
    <div class="text-center mb-3">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" class="login-logo" alt="HILOM Logo">
    </div>

    <h1 class="text-center mb-2">HILOM</h1>
    <p class="text-center text-muted mb-4">Teen Mental Health Analytics Dashboard</p>

    <form method="post" action="{{ url_for('login') }}">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Login
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('register') }}" class="text-decoration-none">
            Create new account
        </a>
    </div>

    <div class="mt-4 small text-muted text-center">
        <p class="mb-1">Admin: admin / admin123</p>
        <p class="mb-0">User: user / user1</p>
    </div>
</div>
{% endblock %}
